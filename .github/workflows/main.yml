name: Marcaje Automático Diario (Go)

on:
  schedule:
    # El marcaje ya NO se dispara por cron de GitHub (scheduling poco confiable:
    # atrasos/drops que caen fuera de la ventana horaria y saltan la marca en
    # silencio). Lo dispara Cloud Scheduler via workflow_dispatch: jobs
    # marcaje-entrada (08:00 CLT) y marcaje-salida (17:30 CLT), TZ America/Santiago.
    
    # CRON Keep-alive (Días 1 y 15) para evitar suspensión por inactividad
    - cron: '0 0 1,15 * *'

  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Activar DEBUG_MODE (simular marcaje sin enviar)'
        required: false
        default: 'false'
        type: boolean

jobs:
  keep-alive:
    if: github.event.schedule == '0 0 1,15 * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Hacer commit vacío
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git commit --allow-empty -m "chore: keep-alive workflow [skip ci]"
          git push

  marcar-turno:
    if: github.event.schedule != '0 0 1,15 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build
        run: go build -o marcaje ./cmd/marcaje

      - name: Ejecutar marcaje
        env:
          ACCOUNTS_STORAGE_BACKEND: firestore
          FIRESTORE_PROJECT_ID: reportability-frontend-staging
          CLOCK_IN_ACTIVE: 'true'
          DEBUG_MODE: ${{ github.event.inputs.debug_mode == 'true' && 'true' || 'false' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: ./marcaje
